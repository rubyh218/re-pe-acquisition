#   retail_income: Two retail leases in place: Decant SF at $6,648.65/mo (1,806 sf, NNN, Lantern Lofts) and Wabi-Sabi at $3,090/mo (411 sf, IG, Ritch Street); total retail income ~$116,867/yr not modeled in residential per-unit revenue field
