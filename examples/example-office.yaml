# example-office.yaml — multi-tenant suburban office, illustrative.
# Pattern: ~85% leased going in, mixed NNN / BYS leases, rollover during hold.

deal_id: meridian_tower
deal_name: Meridian Tower
sponsor: Acquirer

property:
  name: Meridian Tower
  address: 1500 Market Street, Philadelphia, PA 19102
  submarket: CBD Philadelphia
  year_built: 2002
  asset_class: office
  total_rba: 200000
  general_vacancy_pct: 0.05
  rent_roll:
    - tenant: Apex Legal LLP
      suite: "Suite 1200-1500"
      sf: 60000
      base_rent_psf: 32.00
      lease_type: NNN
      lease_start: 2021-07-01
      lease_end: 2028-06-30      # rolls in Yr 3 of hold
      escalation_pct: 0.025
      free_rent_remaining_mo: 0
    - tenant: Apex Legal LLP
      suite: "Suite 1600"
      sf: 15000
      base_rent_psf: 30.00
      lease_type: NNN
      lease_start: 2022-01-01
      lease_end: 2032-12-31
      escalation_pct: 0.025
      free_rent_remaining_mo: 0
    - tenant: Northeast Capital
      suite: "Suite 800-1000"
      sf: 45000
      base_rent_psf: 28.50
      lease_type: BYS
      lease_start: 2020-03-01
      lease_end: 2027-02-28      # rolls in Yr 2
      escalation_pct: 0.03
      free_rent_remaining_mo: 0
    - tenant: Foundry Tech
      suite: "Suite 500-700"
      sf: 35000
      base_rent_psf: 26.00
      lease_type: NNN
      lease_start: 2024-06-01
      lease_end: 2031-05-31
      escalation_pct: 0.03
      free_rent_remaining_mo: 3   # remaining free rent from recent lease
    - tenant: GreenTree Wealth
      suite: "Suite 400"
      sf: 15000
      base_rent_psf: 31.00
      lease_type: BYS
      lease_start: 2024-09-01
      lease_end: 2029-08-31
      escalation_pct: 0.03
      free_rent_remaining_mo: 0

